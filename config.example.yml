port: 8080

# Prowlarr syncs each of its indexers to Sonarr as its own separate Torznab
# entry (rather than one combined feed) — each entry here becomes a route
# at /api/{name}. Match these names/paths to whatever indexers Sonarr's
# Settings > Indexers page currently shows synced from Prowlarr, and their
# numbered URL paths (Prowlarr assigns a number per configured app/indexer
# pair, visible in each indexer's existing URL in Sonarr).
upstreams:
  kinozal: "http://prowlarr:9696/1/api?apikey=${PROWLARR_API_KEY}&t=search"
  nonameclub: "http://prowlarr:9696/2/api?apikey=${PROWLARR_API_KEY}&t=search"
  nonameclubl: "http://prowlarr:9696/3/api?apikey=${PROWLARR_API_KEY}&t=search"
  rutracker: "http://prowlarr:9696/5/api?apikey=${PROWLARR_API_KEY}&t=search"

kinopoisk:
  # Free tier at https://poiskkino.dev/ (200 requests/day) — plenty for a
  # home library with caching enabled.
  base_url: "https://api.kinopoisk.dev"
  api_key: "${KINOPOISK_API_KEY}"

tmdb:
  # Free API key from https://www.themoviedb.org/settings/api
  base_url: "https://api.themoviedb.org/3"
  api_key: "${TMDB_API_KEY}"

# SQLite cache of resolved (Cyrillic title -> English title) mappings, so
# repeat lookups for the same show don't re-query Kinopoisk/TMDB.
cache_path: "/data/kinoadaptarr.db"
